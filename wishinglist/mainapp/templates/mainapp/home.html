{% extends 'mainapp/base.html' %}

{% block title %}Acasă - Travelin'{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm p-4 bg-white rounded">
            <h4 class="mb-3 text-secondary text-center">Adaugă o nouă idee de călătorie</h4>
            
            <form method="POST" action="">
                {% csrf_token %} <div class="mb-3">
                    <label for="reel_url" class="form-label text-muted">Inserează link-ul video</label>
                    <input type="url" name="link_input" id="reel_url" class="form-control" placeholder="https://www.instagram.com/reel/..." required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2">Procesează cu AI ✨</button>
            </form>
            
            <div class="mt-3 text-center">
                <small class="text-muted">Procesarea poate dura câteva secunde pentru descărcare și analiză text.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
