<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Travelin'{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">🧭 Travelin'</a>
            <div class="navbar-nav">
                <a class="nav-link text-white me-3" href="{% url 'home' %}">Acasă</a>
                <a class="nav-link text-white" href="{% url 'the_list' %}">Lista Destinații</a>
            </div>
        </div>
    </nav>

    <div class="container text-center my-4">
        <h1 class="display-5 fw-bold text-primary">Welcome to the Travelin' Log</h1>
        <p class="lead text-muted">a place for ideas and adventures</p>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
